services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 健康检查：只有 pg_isready 通过，数据库才算 healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory
    depends_on:
      db:
        # 关键：等 db 健康检查通过后再启动 app，避免连接还没 ready 的数据库
        condition: service_healthy

  # 测试服务：用 SQLite 内存库跑 pytest，不依赖 db 容器。
  # 用 profiles 标记，docker compose up 不会启动它，只有显式 run 才跑。
  # 用法：docker compose run --rm test
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]

volumes:
  pgdata:
